{% extends "layout.html" %}

{% block title %}
Lets learn Django
{% endblock %}

{% block content %}

<h1 class="text-center mt-5 mb-2">
    {% if form.instance.pk %}
        Edit Tweet
    {% else %}
        Create Tweet
    {% endif %}
</h1>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary">
        Create new Tweet
    </button>
</form>

<a href="{% url 'tweet_list' %}">Go Back To List</a>

{% endblock %}
